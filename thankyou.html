<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitework | Message Received</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .thankyou-page {
    min-height: 100vh;
    background: #111111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .thankyou-logo {
    margin-bottom: 3rem;
  }
  .thankyou-logo img {
    height: 48px;
    width: auto;
  }
  .thankyou-icon {
    width: 72px;
    height: 72px;
    border: 2px solid #16A34A;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    font-size: 2rem;
    color: #16A34A;
  }
  .thankyou-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #16A34A;
    margin-bottom: 1rem;
  }
  .thankyou-headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    color: #F5F5F5;
    line-height: 1;
    margin-bottom: 1.5rem;
    letter-spacing: 0.02em;
  }
  .thankyou-sub {
    font-family: 'Montserrat', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    color: #9CA3AF;
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 3rem;
  }
  .thankyou-sub strong {
    color: #F5F5F5;
    font-weight: 500;
  }
  .thankyou-back {
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #F5F5F5;
    text-decoration: none;
    border: 1px solid #333;
    padding: 1rem 2.5rem;
    transition: border-color 0.2s, color 0.2s;
  }
  .thankyou-back:hover {
    border-color: #16A34A;
    color: #16A34A;
  }
</style>
</head>
<body>
<div class="thankyou-page">
  <div class="thankyou-logo">
    <a href="/">
      <img src="logo-horizontal.png" alt="Sitework">
    </a>
  </div>
  <div class="thankyou-icon">✓</div>
  <div class="thankyou-label">Message Received</div>
  <h1 class="thankyou-headline">We'll Be In Touch.</h1>
  <p class="thankyou-sub">
    Thank you for reaching out. <strong>We respond within 24 hours</strong> — no sales pitch, no pressure. Just an honest conversation about your business and where the opportunities are.
  </p>
  <a href="/" class="thankyou-back">Back to Sitework</a>
</div>
</body>
</html>
